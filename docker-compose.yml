# Local development: bind-mounts source for live reload. Bypasses production entrypoint
# so the host checkout is not chowned by the container.

services:
  app:
    build: .
    ports:
      - "8400:8400"
    env_file:
      - .env
    volumes:
      - .:/app
    entrypoint: ["uvicorn", "app.api.main:app"]
    command: ["--host", "0.0.0.0", "--port", "8400", "--reload"]
