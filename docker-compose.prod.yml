# Production-oriented compose: no source bind-mount, persistent /data volume, no --reload.
# Copy .env.example to .env and set secrets (APP_API_TOKEN, LMSTUDIO_*, etc.).
#
# Example:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Defaults use SQLite and workspace under /data (override with DB_URL / WORKSPACE_ROOT / BACKUP_ROOT).
# Repository cloning for runs requires a git checkout. Mount one read-only and set SOURCE_REPO_PATH, e.g.:
#   volumes:
#     - appdata:/data
#     - /abs/path/to/AI-Dev-Platform:/repo:ro
#   environment:
#     SOURCE_REPO_PATH: /repo

services:
  app:
    build: .
    image: ai-dev-platform:latest
    ports:
      - "8400:8400"
    env_file:
      - .env
    environment:
      DB_URL: sqlite:////data/app.db
      WORKSPACE_ROOT: /data/workspace
      BACKUP_ROOT: /data/backups
    volumes:
      - appdata:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8400/api/health/live')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  appdata: {}
